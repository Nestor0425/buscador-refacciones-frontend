<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inicio de Sesión | IEMCO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Cambio a la fuente Nunito */
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: #ffffff;
            border: none;
            border-radius: 1.5rem; /* Un poco más redondeado para encajar con Nunito */
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
            margin-bottom: 1.5rem;
        }

        /* Ajuste de títulos con el peso de Nunito */
        h3 {
            font-weight: 800;
            color: #212529;
        }

        .form-control {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            border: 1px solid #dee2e6;
            transition: all 0.2s ease;
            font-weight: 400;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(0, 123, 51, 0.1);
            border-color: #007b33;
        }

        .btn-login {
            background-color: #007b33;
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.8rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background-color: #04652c;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 123, 51, 0.2);
        }

        .footer-text {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 2rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-card text-center">
        
        <div class="logo-container">
            <img src="https://iemcousa.com/application/files/9615/2838/9508/logo.png" alt="IEMCO Logo">
        </div>

        <h3 class="mb-1">Bienvenido</h3>
        <p class="text-muted mb-4">Accede a tu cuenta</p>

        <form id="loginForm" class="text-start">
            <div class="mb-3">
                <label for="email" class="form-label small fw-bold">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com" required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-bold">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-login w-100">Entrar</button>
        </form>

        <p class="footer-text">&copy; CONTENEDORES IEM - 2026</p>
    </div>
</div>

<script src="js/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
