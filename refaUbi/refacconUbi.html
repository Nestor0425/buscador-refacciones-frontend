<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refacciones con Ubicación</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

  <div class="text-center mb-4">
    <button id="btnUbicadas" class="btn btn-success btn-lg">
      Mostrar refacciones con ubicación
    </button>
  </div>

  <!-- Card del total -->
  <div id="totalCard" class="mb-4"></div>

  <!-- Grid de cards -->
  <div id="resultadoUbi" class="row g-4"></div>

</div>

<script>
document.getElementById("btnUbicadas").addEventListener("click", async () => {
  try {
    const response = await fetch("https://buscador-refaccionesbackend.onrender.com/refacciones/con-ubicacion");
    const result = await response.json();

    const contenedor = document.getElementById("resultadoUbi");
    const totalCard = document.getElementById("totalCard");

    contenedor.innerHTML = "";
    totalCard.innerHTML = "";

    if (!result.ok) {
      contenedor.innerHTML = "<p class='text-danger'>Error al obtener datos</p>";
      return;
    }

    if (result.data.length === 0) {
      contenedor.innerHTML = "<p>No hay refacciones con ubicación</p>";
      return;
    }

    // 🔥 Card del total
    totalCard.innerHTML = `
      <div class="card shadow-sm border-0">
        <div class="card-body text-center">
          <h4 class="mb-0">
            Total de refacciones con ubicación:
            <span class="text-success fw-bold">${result.data.length}</span>
          </h4>
        </div>
      </div>
    `;

    // 🔥 Cards en grid
    result.data.forEach(ref => {
      contenedor.innerHTML += `
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
          <div class="card h-100 shadow-sm border-0">

            <img 
              src="${ref.imagen || 'https://via.placeholder.com/300x200?text=Sin+Imagen'}" 
              class="card-img-top"
              style="height:200px; object-fit:cover;"
            >

            <div class="card-body d-flex flex-column">
              <h6 class="card-title fw-bold">${ref.nombreprod || "Sin nombre"}</h6>

              <p class="mb-1">
                <strong>Ref:</strong> ${ref.refinterna || "N/A"}
              </p>

              <p class="mb-1">
                <strong>Ubicación:</strong> 
                <span class="badge bg-success">${ref.ubicacion}</span>
              </p>

              <p class="mt-auto mb-0">
                <strong>Cantidad:</strong> ${ref.cantidad || 0}
              </p>
            </div>

          </div>
        </div>
      `;
    });

  } catch (error) {
    console.error("Error:", error);
  }
});
</script>

</body>
</html>
