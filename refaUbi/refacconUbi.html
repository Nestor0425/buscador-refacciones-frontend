<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btnUbicadas">
  Mostrar refacciones con ubicación
</button>

<div id="resultadoUbi"></div>
</body>
<script>
document.getElementById("btnUbicadas").addEventListener("click", async () => {
  try {
    const response = await fetch("https://buscador-refaccionesbackend.onrender.com/refacciones/con-ubicacion");
    const result = await response.json();

    const contenedor = document.getElementById("resultado");
    contenedor.innerHTML = "";

    if (!result.ok) {
      contenedor.innerHTML = "<p>Error al obtener datos</p>";
      return;
    }

    if (result.data.length === 0) {
      contenedor.innerHTML = "<p>No hay refacciones con ubicación</p>";
      return;
    }

    result.data.forEach(ref => {
      contenedor.innerHTML += `
        <div>
          <strong>${ref.descripcion || "Sin descripción"}</strong>
          - ${ref.ubicacion}
        </div>
      `;
    });

  } catch (error) {
    console.error("Error:", error);
  }
});
</script>
</html>
