<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refacciones con Ubicación</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

  <div class="text-center mb-4">
    <button id="btnUbicadas" class="btn btn-success btn-lg">
      Mostrar refacciones con ubicación
    </button>
  </div>

  <!-- Buscador -->
  <div class="mb-4 d-none" id="buscadorContainer">
    <input 
      type="text" 
      id="buscador" 
      class="form-control form-control-lg"
      placeholder="Buscar por nombre, referencia o ubicación..."
    >
  </div>

  <!-- Card total -->
  <div id="totalCard" class="mb-4"></div>

  <!-- Grid -->
  <div id="resultadoUbi" class="row g-4"></div>

</div>

<script>

let refaccionesGlobal = [];

document.getElementById("btnUbicadas").addEventListener("click", async () => {
  try {
    const response = await fetch("https://buscador-refaccionesbackend.onrender.com/refacciones/con-ubicacion");
    const result = await response.json();

    const contenedor = document.getElementById("resultadoUbi");
    const totalCard = document.getElementById("totalCard");
    const buscadorContainer = document.getElementById("buscadorContainer");

    contenedor.innerHTML = "";
    totalCard.innerHTML = "";

    if (!result.ok) {
      contenedor.innerHTML = "<p class='text-danger'>Error al obtener datos</p>";
      return;
    }

    if (!result.data || result.data.length === 0) {
      contenedor.innerHTML = "<p>No hay refacciones con ubicación</p>";
      return;
    }

    refaccionesGlobal = result.data;

    buscadorContainer.classList.remove("d-none");

    renderizarCards(refaccionesGlobal);

  } catch (error) {
    console.error("Error:", error);
  }
});


function renderizarCards(data) {
  const contenedor = document.getElementById("resultadoUbi");
  const totalCard = document.getElementById("totalCard");

  contenedor.innerHTML = "";
  totalCard.innerHTML = "";

  // Card total
  totalCard.innerHTML = `
    <div class="card shadow-sm border-0">
      <div class="card-body text-center">
        <h4 class="mb-0">
          Total encontrados:
          <span class="text-success fw-bold">${data.length}</span>
        </h4>
      </div>
    </div>
  `;

  if (data.length === 0) {
    contenedor.innerHTML = "<p>No se encontraron resultados</p>";
    return;
  }

  data.forEach(ref => {
    contenedor.innerHTML += `
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card h-100 shadow-sm border-0">

          <img 
            src="${ref.imagen || 'https://via.placeholder.com/300x200?text=Sin+Imagen'}" 
            class="card-img-top"
            style="height:200px; object-fit:cover;"
          >

          <div class="card-body d-flex flex-column">
            <h6 class="card-title fw-bold">
              ${ref.nombreprod || "Sin nombre"}
            </h6>

            <p class="mb-1">
              <strong>Ref:</strong> ${ref.refinterna || "N/A"}
            </p>

            <p class="mb-1">
              <strong>Ubicación:</strong> 
              <span class="badge bg-success">
                ${ref.ubicacion}
              </span>
            </p>

            <p class="mt-auto mb-0">
              <strong>Cantidad:</strong> ${ref.cantidad || 0}
            </p>
          </div>

        </div>
      </div>
    `;
  });
}


// 🔎 Buscador en tiempo real
document.getElementById("buscador").addEventListener("input", (e) => {
  const texto = e.target.value.toLowerCase();

  const filtradas = refaccionesGlobal.filter(ref =>
    (ref.nombreprod || "").toLowerCase().includes(texto) ||
    (ref.refinterna || "").toLowerCase().includes(texto) ||
    (ref.ubicacion || "").toLowerCase().includes(texto)
  );

  renderizarCards(filtradas);
});

</script>

</body>
</html>
