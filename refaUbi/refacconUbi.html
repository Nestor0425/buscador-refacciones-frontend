<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refacciones con Ubicación</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
.pagination .page-link {
  border-radius: 8px;
  margin: 0 3px;
}

.pagination .active .page-link {
  background-color: #198754;
  border-color: #198754;
}

#visorImagen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;
  overflow: hidden;
}

.visor-hidden {
  display: none !important;
}

#visorImg {
  max-width: none;
  max-height: none;
  cursor: grab;
  transition: transform 0.1s ease;
}

.visor-controls {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 100000;
}

.visor-controls button {
  background: white;
  border: none;
  padding: 8px 12px;
  margin-left: 5px;
  border-radius: 6px;
  font-weight: bold;
}
</style>
</head>

<body class="bg-light">

<div class="container py-4">

  <div class="text-center mb-4">
    <button id="btnUbicadas" class="btn btn-success btn-lg">
      Mostrar refacciones con ubicación
    </button>
  </div>

  <!-- Buscador -->
  <div class="mb-4 d-none" id="buscadorContainer">
    <input 
      type="text" 
      id="buscador" 
      class="form-control form-control-lg"
      placeholder="Buscar por nombre, referencia o ubicación..."
    >
  </div>
  <div id="progresoUbicacion" class="mb-4"></div>
  <!-- Card total -->
  <div id="totalCard" class="mb-4"></div>

  <!-- Grid -->
  <div id="resultadoUbi" class="row g-4"></div>
  <div id="paginacion" class="mt-4 d-flex justify-content-center flex-wrap"></div>

</div>

<div id="visorImagen" class="visor-hidden">
  <div class="visor-controls">
    <button id="zoomIn">+</button>
    <button id="zoomOut">−</button>
    <button id="cerrarVisor">✕</button>
  </div>
  <img id="visorImg">
</div>

<script>

let refaccionesOriginal = [];
let refaccionesFiltradas = [];

let paginaActual = 1;
const porPagina = 12;

document.getElementById("btnUbicadas").addEventListener("click", async () => {
  try {

    const [respUbicadas, respTodas] = await Promise.all([
      fetch("https://buscador-refaccionesbackend.onrender.com/refacciones/con-ubicacion"),
      fetch("https://buscador-refaccionesbackend.onrender.com/refacciones")
    ]);

    const ubicadas = await respUbicadas.json();
    const todas = await respTodas.json();

    if (!ubicadas || !ubicadas.data) {
  document.getElementById("resultadoUbi").innerHTML =
    "<p class='text-danger'>Error en endpoint con-ubicacion</p>";
  return;
}

if (!todas || (!todas.data && !Array.isArray(todas))) {
  document.getElementById("resultadoUbi").innerHTML =
    "<p class='text-danger'>Error en endpoint general</p>";
  return;
}

    const totalGeneral = Array.isArray(todas)
  ? todas.length
  : todas.data.length;

const totalConUbicacion = ubicadas.data.length;

    mostrarProgreso(totalGeneral, totalConUbicacion);

    refaccionesOriginal = ubicadas.data;
    refaccionesFiltradas = [...refaccionesOriginal];
    paginaActual = 1;

    document.getElementById("buscadorContainer").classList.remove("d-none");

    renderizarTodo();

  } catch (error) {
    console.error("Error:", error);
  }
});

function renderizarTodo() {
  renderizarCards();
  renderizarPaginacion();
}


function renderizarCards() {

  const contenedor = document.getElementById("resultadoUbi");
  const totalCard = document.getElementById("totalCard");

  contenedor.innerHTML = "";
  totalCard.innerHTML = "";

  const inicio = (paginaActual - 1) * porPagina;
  const fin = inicio + porPagina;

  const datosPagina = refaccionesFiltradas.slice(inicio, fin);

  totalCard.innerHTML = `
    <div class="card shadow-sm border-0">
      <div class="card-body text-center">
        <h5 class="mb-0">
          Total registros: 
          <span class="text-success fw-bold">${refaccionesFiltradas.length}</span>
        </h5>
      </div>
    </div>
  `;

  if (datosPagina.length === 0) {
    contenedor.innerHTML = "<p>No se encontraron resultados</p>";
    return;
  }

  datosPagina.forEach(ref => {
  contenedor.innerHTML += `
    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <div class="card h-100 shadow-sm border-0">

        <div class="position-relative">

          <img 
            src="${ref.imagen || 'https://via.placeholder.com/300x200?text=Sin+Imagen'}"
            class="card-img-top"
            style="height:200px; object-fit:cover;"
          >

          <!-- CHECK -->
          <button class="btn btn-light position-absolute top-0 end-0 m-2 btn-check-ref"
                  data-id="${ref.id}">
            <i class="bi ${ref.completada ? 'bi-check-circle-fill text-success' : 'bi-circle'}"></i>
          </button>

          <!-- FULLSCREEN -->
          <button class="btn btn-light position-absolute top-0 start-0 m-2 btn-fullscreen"
                  data-img="${ref.imagen || 'no-image.jpg'}">
            <i class="bi bi-fullscreen"></i>
          </button>

        </div>

        <div class="card-body d-flex flex-column">
          <h6 class="card-title fw-bold">
            ${ref.nombreprod || "Sin nombre"}
          </h6>

          <p class="mb-1">
            <strong>Ref:</strong> ${ref.refinterna || "N/A"}
          </p>

          <p class="mb-1">
            <strong>Ubicación:</strong>
            <span class="badge bg-success">
              ${ref.ubicacion}
            </span>
          </p>

          <p class="mt-auto mb-0">
            <strong>Cantidad:</strong> ${ref.cantidad || 0}
          </p>
        </div>

      </div>
    </div>
  `;
});
}


function renderizarPaginacion() {

  const paginacion = document.getElementById("paginacion");
  paginacion.innerHTML = "";

  const totalPaginas = Math.ceil(refaccionesFiltradas.length / porPagina);
  if (totalPaginas <= 1) return;

  let html = `<nav><ul class="pagination pagination-lg shadow-sm">`;

  html += `
    <li class="page-item ${paginaActual === 1 ? "disabled" : ""}">
      <button class="page-link" onclick="cambiarPagina(${paginaActual - 1})">
        Anterior
      </button>
    </li>
  `;

  for (let i = 1; i <= totalPaginas; i++) {
    html += `
      <li class="page-item ${paginaActual === i ? "active" : ""}">
        <button class="page-link" onclick="cambiarPagina(${i})">
          ${i}
        </button>
      </li>
    `;
  }

  html += `
    <li class="page-item ${paginaActual === totalPaginas ? "disabled" : ""}">
      <button class="page-link" onclick="cambiarPagina(${paginaActual + 1})">
        Siguiente
      </button>
    </li>
  `;

  html += `</ul></nav>`;

  paginacion.innerHTML = html;
}


function cambiarPagina(numero) {
  const totalPaginas = Math.ceil(refaccionesFiltradas.length / porPagina);

  if (numero < 1 || numero > totalPaginas) return;

  paginaActual = numero;
  renderizarTodo();
  window.scrollTo({ top: 0, behavior: "smooth" });
}


// 🔎 BUSCADOR CORREGIDO
document.getElementById("buscador").addEventListener("input", (e) => {

  const texto = e.target.value.toLowerCase();

  refaccionesFiltradas = refaccionesOriginal.filter(ref =>
    (ref.nombreprod || "").toLowerCase().includes(texto) ||
    (ref.refinterna || "").toLowerCase().includes(texto) ||
    (ref.ubicacion || "").toLowerCase().includes(texto)
  );

  paginaActual = 1;

  renderizarTodo();
});

function mostrarProgreso(totalGeneral, totalConUbicacion) {

  const contenedor = document.getElementById("progresoUbicacion");

  const porcentaje = totalGeneral === 0 
    ? 0 
    : Math.round((totalConUbicacion / totalGeneral) * 100);

  contenedor.innerHTML = `
    <div class="card shadow-sm border-0">
      <div class="card-body">

        <div class="d-flex justify-content-between mb-2">
          <strong>Refacciones ubicadas</strong>
          <span>${totalConUbicacion} / ${totalGeneral} (${porcentaje}%)</span>
        </div>

        <div class="progress" style="height: 25px;">
          <div 
            class="progress-bar bg-success"
            role="progressbar"
            style="width: ${porcentaje}%"
          >
            ${porcentaje}%
          </div>
        </div>

      </div>
    </div>
  `;
}

document.addEventListener("click", async (e) => {
  const btn = e.target.closest(".btn-check-ref");
  if (!btn) return;

  try {
    btn.disabled = true;

    const id = btn.dataset.id;

    const res = await fetch(
      `https://buscador-refaccionesbackend.onrender.com/refacciones/${id}/completar`,
      { method: "PATCH" }
    );

    if (!res.ok) throw new Error("Error servidor");

    const data = await res.json();

    // 🔄 Actualizar icono
    const icon = btn.querySelector("i");
    icon.className = data.completada
      ? "bi bi-check-circle-fill text-success"
      : "bi bi-circle";

    // 🔄 Actualizar arrays locales
    const actualizarEstado = (lista) => {
      const item = lista.find(r => r.id == id);
      if (item) item.completada = data.completada;
    };

    actualizarEstado(refaccionesOriginal);
    actualizarEstado(refaccionesFiltradas);

  } catch (error) {
    console.error(error);
    alert("No se pudo actualizar");
  } finally {
    btn.disabled = false;
  }
});

// ======================
// FULLSCREEN IMAGE
// ======================

let scale = 1;
let posX = 0;
let posY = 0;
let isDragging = false;
let startX, startY;

const visor = document.getElementById("visorImagen");
const img = document.getElementById("visorImg");

// abrir visor
document.addEventListener("click", (e) => {
  const btn = e.target.closest(".btn-fullscreen");
  if (!btn) return;

  img.src = btn.dataset.img;

  scale = 1;
  posX = 0;
  posY = 0;
  img.style.transform = `translate(0px,0px) scale(1)`;

  visor.classList.remove("visor-hidden");
});

// cerrar
document.getElementById("cerrarVisor").addEventListener("click", () => {
  visor.classList.add("visor-hidden");
});

// zoom botones
document.getElementById("zoomIn").addEventListener("click", () => {
  scale += 0.2;
  actualizarTransform();
});

document.getElementById("zoomOut").addEventListener("click", () => {
  scale = Math.max(0.5, scale - 0.2);
  actualizarTransform();
});

function actualizarTransform() {
  img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

// DRAG MOUSE
img.addEventListener("mousedown", (e) => {
  isDragging = true;
  img.style.cursor = "grabbing";
  startX = e.clientX - posX;
  startY = e.clientY - posY;
});

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  posX = e.clientX - startX;
  posY = e.clientY - startY;
  actualizarTransform();
});

document.addEventListener("mouseup", () => {
  isDragging = false;
  img.style.cursor = "grab";
});

// DRAG TOUCH
img.addEventListener("touchstart", (e) => {
  const touch = e.touches[0];
  isDragging = true;
  startX = touch.clientX - posX;
  startY = touch.clientY - posY;
});

img.addEventListener("touchmove", (e) => {
  if (!isDragging) return;
  const touch = e.touches[0];
  posX = touch.clientX - startX;
  posY = touch.clientY - startY;
  actualizarTransform();
});

img.addEventListener("touchend", () => {
  isDragging = false;
});
</script>




</body>
</html>
